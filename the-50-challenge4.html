<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="50 Challenge" />
<title>The 50 Challenge</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23151513'/%3E%3Ctext x='50' y='64' font-size='46' font-family='Georgia,serif' font-weight='700' fill='%23E85D2C' text-anchor='middle'%3E50%3C/text%3E%3C/svg%3E" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #151513;
    --bg-elev: #1D1D1A;
    --text: #F2EFE9;
    --text-dim: #8C8A82;
    --border: #2C2C28;
    --ring-track: #262622;
    --bar-under: #3A3934;
    --accent-pushups: #E85D2C;
    --accent-squats: #7A8B5C;
    --accent-knee: #6B7A8F;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif; }
  .app-shell { min-height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }
  .app-header { padding: 20px 20px 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 5; }
  .brand { display: flex; align-items: baseline; gap: 8px; margin-bottom: 14px; }
  .brand-num { font-family: "Georgia", serif; font-weight: 700; font-size: 28px; letter-spacing: -0.02em; color: var(--text); }
  .brand-text { font-size: 11px; letter-spacing: 0.14em; color: var(--text-dim); font-weight: 600; }
  .ex-tabs { display: flex; gap: 8px; }
  .ex-tab { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; letter-spacing: 0.01em; }
  .ex-tab-active { background: rgba(255,255,255,0.04); }
  .ex-tab-add { width: 32px; padding: 6px; display: flex; align-items: center; justify-content: center; }
  .app-main { flex: 1; overflow-y: auto; padding-bottom: 84px; }
  .view { padding: 20px; display: flex; flex-direction: column; gap: 18px; }
  .date-nav { display: flex; align-items: center; justify-content: space-between; }
  .date-label { display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 600; }
  .icon-btn { background: var(--bg-elev); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .icon-btn:disabled { opacity: 0.3; }
  .ring-wrap { display: flex; flex-direction: column; align-items: center; position: relative; padding: 8px 0; }
  .ring { display: block; }
  .ring-num { font-family: "Georgia", serif; font-size: 34px; font-weight: 700; }
  .ring-target { font-size: 13px; font-weight: 600; }
  .target-badge { margin-top: 8px; color: #151513; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
  .segbar { position: relative; width: 100%; }
  .segbar-track { display: flex; width: 100%; height: 100%; border-radius: 6px; overflow: hidden; background: var(--ring-track); }
  .segbar-seg { height: 100%; border-right: 1.5px solid var(--bg); }
  .segbar-seg:last-child { border-right: none; }
  .segbar-marker { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--text); opacity: 0.5; }
  .entry-row { display: flex; gap: 8px; align-items: center; }
  .stepper { display: flex; align-items: center; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; flex: 1; overflow: hidden; }
  .stepper-btn { background: transparent; border: none; border-radius: 0; }
  .reps-input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 20px; font-weight: 700; text-align: center; width: 100%; outline: none; font-family: "Georgia", serif; }
  .reps-input::-webkit-outer-spin-button, .reps-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .flag-toggle { display: flex; align-items: center; gap: 5px; background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim); padding: 0 12px; height: 44px; border-radius: 10px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .flag-active { color: var(--accent-knee); border-color: var(--accent-knee); background: rgba(107,122,143,0.12); }
  .add-btn { width: 44px; height: 44px; border-radius: 10px; border: none; color: #151513; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sets-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: 10px; overflow: hidden; }
  .set-row { display: flex; align-items: center; gap: 10px; background: var(--bg-elev); padding: 10px 14px; font-size: 14px; }
  .set-idx { color: var(--text-dim); font-size: 12px; font-weight: 600; width: 46px; }
  .set-reps { font-family: "Georgia", serif; font-weight: 700; font-size: 16px; flex: 1; }
  .flag-mini, .delete-mini { background: transparent; border: none; color: var(--text-dim); width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
  .flag-mini-active { color: var(--accent-knee); }
  .set-row-total { background: rgba(255,255,255,0.03); }
  .set-row-total .set-idx { color: var(--text); }
  .empty-hint { padding: 16px; text-align: center; color: var(--text-dim); font-size: 13px; background: var(--bg-elev); border-radius: 10px; }
  .seg-control { display: flex; gap: 6px; }
  .seg-control-secondary { margin-top: -8px; }
  .seg-opt { background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim); padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; flex: 1; }
  .seg-opt-active { background: rgba(255,255,255,0.06); color: var(--text); border-color: rgba(255,255,255,0.2); }
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-row { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
  .history-row-top { display: flex; justify-content: space-between; align-items: center; }
  .history-date { font-size: 13px; color: var(--text-dim); font-weight: 600; }
  .history-total { font-family: "Georgia", serif; font-weight: 700; font-size: 16px; display: flex; align-items: center; }
  .history-target-txt { font-family: -apple-system, sans-serif; font-size: 11px; color: var(--text-dim); font-weight: 600; margin-left: 2px; }
  .history-sets { display: flex; flex-wrap: wrap; gap: 6px; }
  .history-chip { border: 1px solid; border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 700; display: flex; align-items: center; }
  .history-empty { color: var(--text-dim); font-size: 12px; }
  .stat-row { display: flex; gap: 8px; }
  .stat-card { flex: 1; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; padding: 12px 8px; text-align: center; }
  .stat-num { font-family: "Georgia", serif; font-weight: 700; font-size: 22px; }
  .stat-label { font-size: 10.5px; color: var(--text-dim); font-weight: 600; margin-top: 2px; letter-spacing: 0.02em; }
  .chart-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; padding: 14px 10px 6px; }
  .chart-svg { display: block; }
  .chart-axis-label { font-size: 9px; font-weight: 600; }
  .chart-x-labels { display: flex; justify-content: space-between; padding: 4px 8px 0; font-size: 11px; color: var(--text-dim); font-weight: 600; }
  .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; display: flex; background: var(--bg-elev); border-top: 1px solid var(--border); padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: transparent; border: none; color: var(--text-dim); font-size: 10.5px; font-weight: 600; padding: 4px 0; }
  .tab-btn-active { color: var(--text); }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: flex-end; justify-content: center; z-index: 20; }
  .modal-card { background: var(--bg-elev); width: 100%; max-width: 480px; border-radius: 16px 16px 0 0; padding: 18px 16px max(18px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 10px; border-top: 1px solid var(--border); }
  .modal-head { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .modal-option { background: transparent; border: 1px solid; border-radius: 10px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 14px; }
  input[type=number] { -moz-appearance: textfield; }
  .icon { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function () {
  "use strict";
  var TARGET = 50;
  var EXERCISES = [{ id: "pushups", label: "Pushups" }, { id: "squats", label: "Squats" }];
  var ACCENT = { pushups: "#E85D2C", squats: "#7A8B5C", knee: "#6B7A8F" };
  var STORAGE_KEY = "fifty-challenge:data";

  var state = {
    log: {}, dateIso: "", tab: "today", exercisesEnabled: ["pushups"], exIndex: 0,
    inputVal: "", knee: false, range_history: 7, mode_history: "total", range_progress: 7, showAddExercise: false
  };

  function pad(n) { return String(n).padStart(2, "0"); }
  function todayISO() { var d = new Date(); return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function isoToDate(iso) { var p = iso.split("-").map(Number); return new Date(p[0], p[1] - 1, p[2]); }
  function addDays(iso, n) { var d = isoToDate(iso); d.setDate(d.getDate() + n); return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function fmtDay(iso) {
    var d = isoToDate(iso), today = todayISO(), yest = addDays(today, -1);
    if (iso === today) return "Today";
    if (iso === yest) return "Yesterday";
    return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  }
  function fmtShort(iso) { return isoToDate(iso).toLocaleDateString(undefined, { month: "short", day: "numeric" }); }
  function lastNDays(n, endIso) { var a = []; for (var i = n - 1; i >= 0; i--) a.push(addDays(endIso, -i)); return a; }

  function loadLog() { try { var r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : {}; } catch (e) { return {}; } }
  function saveLog(log) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(log)); } catch (e) {} }
  function uid() { return Math.random().toString(36).slice(2, 10); }
  function clone(o) { return JSON.parse(JSON.stringify(o)); }
  function dayTotal(log, d, ex) { var s = (log[d] && log[d][ex]) || []; var t = 0; for (var i = 0; i < s.length; i++) t += s[i].reps; return t; }
  function daySets(log, d, ex) { return (log[d] && log[d][ex]) || []; }

  function el(tag, attrs, children) {
    var e = document.createElement(tag);
    attrs = attrs || {};
    for (var k in attrs) {
      if (k === "class") e.className = attrs[k];
      else if (k === "style") e.setAttribute("style", attrs[k]);
      else if (k.indexOf("on") === 0 && typeof attrs[k] === "function") e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      else if (k === "disabled") { if (attrs[k]) e.setAttribute("disabled", "true"); }
      else e.setAttribute(k, attrs[k]);
    }
    children = children || [];
    if (!Array.isArray(children)) children = [children];
    children.forEach(function (c) {
      if (c === null || c === undefined) return;
      if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(String(c)));
      else e.appendChild(c);
    });
    return e;
  }
  function svgEl(tag, attrs, children) {
    var e = document.createElementNS("http://www.w3.org/2000/svg", tag);
    attrs = attrs || {};
    for (var k in attrs) e.setAttribute(k, attrs[k]);
    children = children || [];
    if (!Array.isArray(children)) children = [children];
    children.forEach(function (c) { if (c) e.appendChild(c); });
    return e;
  }
  function icon(name, size, extraStyle) {
    size = size || 18;
    var svg = svgEl("svg", { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", "stroke-width": "2", "stroke-linecap": "round", "stroke-linejoin": "round", class: "icon", style: extraStyle || "" });
    var paths = {
      flag: [["path", { d: "M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" }], ["line", { x1: 4, y1: 22, x2: 4, y2: 15 }]],
      plus: [["line", { x1: 12, y1: 5, x2: 12, y2: 19 }], ["line", { x1: 5, y1: 12, x2: 19, y2: 12 }]],
      minus: [["line", { x1: 5, y1: 12, x2: 19, y2: 12 }]],
      check: [["polyline", { points: "20 6 9 17 4 12" }]],
      chevronLeft: [["polyline", { points: "15 18 9 12 15 6" }]],
      chevronRight: [["polyline", { points: "9 18 15 12 9 6" }]],
      calendar: [["rect", { x: 3, y: 4, width: 18, height: 18, rx: 2 }], ["line", { x1: 16, y1: 2, x2: 16, y2: 6 }], ["line", { x1: 8, y1: 2, x2: 8, y2: 6 }], ["line", { x1: 3, y1: 10, x2: 21, y2: 10 }]],
      trendingUp: [["polyline", { points: "23 6 13.5 15.5 8.5 10.5 1 18" }], ["polyline", { points: "17 6 23 6 23 12" }]],
      listTree: [["path", { d: "M21 12h-8" }], ["path", { d: "M21 6H8" }], ["path", { d: "M21 18h-8" }], ["path", { d: "M3 6v4c0 2 1 3 3 3h3" }], ["path", { d: "M3 6v10" }]],
      trash: [["polyline", { points: "3 6 5 6 21 6" }], ["path", { d: "M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" }], ["path", { d: "M10 11v6" }], ["path", { d: "M14 11v6" }], ["path", { d: "M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" }]],
      x: [["line", { x1: 18, y1: 6, x2: 6, y2: 18 }], ["line", { x1: 6, y1: 6, x2: 18, y2: 18 }]]
    };
    (paths[name] || []).forEach(function (p) { svg.appendChild(svgEl(p[0], p[1])); });
    return svg;
  }

  function segBar(sets, color, height) {
    height = height || 14;
    var total = sets.reduce(function (s, x) { return s + x.reps; }, 0);
    var scale = Math.max(total, TARGET);
    var track = el("div", { class: "segbar-track" });
    sets.forEach(function (s) {
      track.appendChild(el("div", { class: "segbar-seg", style: "width:" + (s.reps / scale * 100) + "%;background:" + (s.knee ? ACCENT.knee : color) + ";" }));
    });
    var marker = el("div", { class: "segbar-marker", style: "left:" + Math.min(TARGET / scale * 100, 100) + "%;" });
    return el("div", { class: "segbar", style: "height:" + height + "px;" }, [track, marker]);
  }

  function ringProgress(value, color) {
    var size = 132, stroke = 10, r = (size - stroke) / 2, c = 2 * Math.PI * r;
    var pct = Math.min(value / TARGET, 1), dash = c * pct;
    var svg = svgEl("svg", { width: size, height: size, class: "ring" });
    svg.appendChild(svgEl("circle", { cx: size / 2, cy: size / 2, r: r, fill: "none", stroke: "var(--ring-track)", "stroke-width": stroke }));
    var progress = svgEl("circle", { cx: size / 2, cy: size / 2, r: r, fill: "none", stroke: color, "stroke-width": stroke, "stroke-dasharray": dash + " " + (c - dash), "stroke-linecap": "round", transform: "rotate(-90 " + size / 2 + " " + size / 2 + ")" });
    progress.style.transition = "stroke-dasharray 0.5s cubic-bezier(.4,1.6,.4,1)";
    svg.appendChild(progress);
    var t1 = svgEl("text", { x: "50%", y: "46%", "text-anchor": "middle", class: "ring-num", fill: "var(--text)" }); t1.textContent = value; svg.appendChild(t1);
    var t2 = svgEl("text", { x: "50%", y: "63%", "text-anchor": "middle", class: "ring-target", fill: "var(--text-dim)" }); t2.textContent = "/ " + TARGET; svg.appendChild(t2);
    return svg;
  }

  function currentExId() { return state.exercisesEnabled[state.exIndex] || "pushups"; }

  function renderToday(container) {
    var exId = currentExId(), color = ACCENT[exId], dateIso = state.dateIso;
    var sets = daySets(state.log, dateIso, exId), total = dayTotal(state.log, dateIso, exId);
    var hitTarget = total >= TARGET, isToday = dateIso === todayISO();
    var view = el("div", { class: "view" });

    view.appendChild(el("div", { class: "date-nav" }, [
      el("button", { class: "icon-btn", onClick: function () { state.dateIso = addDays(state.dateIso, -1); render(); } }, icon("chevronLeft", 20)),
      el("div", { class: "date-label" }, [icon("calendar", 14, "opacity:0.6"), el("span", {}, fmtDay(dateIso))]),
      el("button", { class: "icon-btn", disabled: isToday, onClick: function () { if (!isToday) { state.dateIso = addDays(state.dateIso, 1); render(); } } }, icon("chevronRight", 20))
    ]));

    var ringWrap = el("div", { class: "ring-wrap" }, [ringProgress(total, color)]);
    if (hitTarget) ringWrap.appendChild(el("div", { class: "target-badge", style: "background:" + color + ";" }, "Target hit"));
    view.appendChild(ringWrap);
    view.appendChild(segBar(sets, color, 16));

    var input = el("input", { class: "reps-input", type: "number", inputmode: "numeric", placeholder: "0", value: state.inputVal });
    input.addEventListener("input", function (e) { state.inputVal = e.target.value; });
    input.addEventListener("keydown", function (e) { if (e.key === "Enter") addSet(); });

    var stepper = el("div", { class: "stepper" }, [
      el("button", { class: "icon-btn stepper-btn", onClick: function () { state.inputVal = String(Math.max(0, (parseInt(state.inputVal || "0", 10)) - 1)); render(); } }, icon("minus", 16)),
      input,
      el("button", { class: "icon-btn stepper-btn", onClick: function () { state.inputVal = String((parseInt(state.inputVal || "0", 10)) + 1); render(); } }, icon("plus", 16))
    ]);
    var flagBtn = el("button", { class: "flag-toggle" + (state.knee ? " flag-active" : ""), onClick: function () { state.knee = !state.knee; render(); } }, [icon("flag", 16), el("span", {}, "Knees")]);
    var addBtn = el("button", { class: "add-btn", style: "background:" + color + ";", onClick: addSet }, icon("check", 18));
    view.appendChild(el("div", { class: "entry-row" }, [stepper, flagBtn, addBtn]));

    function addSet() {
      var n = parseInt(state.inputVal, 10);
      if (!n || n <= 0) return;
      var next = clone(state.log);
      if (!next[dateIso]) next[dateIso] = {};
      if (!next[dateIso][exId]) next[dateIso][exId] = [];
      next[dateIso][exId].push({ id: uid(), reps: n, knee: state.knee });
      state.log = next; saveLog(next); state.inputVal = ""; state.knee = false; render();
    }

    var setsList = el("div", { class: "sets-list" });
    if (sets.length === 0) setsList.appendChild(el("div", { class: "empty-hint" }, "No sets logged for this day yet."));
    sets.forEach(function (s, i) {
      setsList.appendChild(el("div", { class: "set-row" }, [
        el("span", { class: "set-idx" }, "Set " + (i + 1)),
        el("span", { class: "set-reps" }, String(s.reps)),
        el("button", { class: "flag-mini" + (s.knee ? " flag-mini-active" : ""), onClick: function () {
          var next = clone(state.log);
          next[dateIso][exId] = next[dateIso][exId].map(function (x) { return x.id === s.id ? Object.assign({}, x, { knee: !x.knee }) : x; });
          state.log = next; saveLog(next); render();
        } }, icon("flag", 13)),
        el("button", { class: "delete-mini", onClick: function () {
          var next = clone(state.log);
          next[dateIso][exId] = next[dateIso][exId].filter(function (x) { return x.id !== s.id; });
          state.log = next; saveLog(next); render();
        } }, icon("trash", 13))
      ]));
    });
    if (sets.length > 0) {
      setsList.appendChild(el("div", { class: "set-row set-row-total" }, [
        el("span", { class: "set-idx" }, "Total"), el("span", { class: "set-reps" }, String(total)),
        el("span", { style: "width:13px;" }), el("span", { style: "width:13px;" })
      ]));
    }
    view.appendChild(setsList);
    container.appendChild(view);
  }

  function renderHistory(container) {
    var exId = currentExId(), color = ACCENT[exId], today = todayISO();
    var range = state.range_history, mode = state.mode_history, days = lastNDays(range, today);
    var view = el("div", { class: "view" });

    var rangeCtl = el("div", { class: "seg-control" });
    [7, 30, 60].forEach(function (r) { rangeCtl.appendChild(el("button", { class: "seg-opt" + (range === r ? " seg-opt-active" : ""), onClick: function () { state.range_history = r; render(); } }, r + "d")); });
    view.appendChild(rangeCtl);

    view.appendChild(el("div", { class: "seg-control seg-control-secondary" }, [
      el("button", { class: "seg-opt" + (mode === "total" ? " seg-opt-active" : ""), onClick: function () { state.mode_history = "total"; render(); } }, "Totals"),
      el("button", { class: "seg-opt" + (mode === "sets" ? " seg-opt-active" : ""), onClick: function () { state.mode_history = "sets"; render(); } }, "Per set")
    ]));

    var list = el("div", { class: "history-list" });
    days.slice().reverse().forEach(function (d) {
      var sets = daySets(state.log, d, exId), total = dayTotal(state.log, d, exId), hit = total >= TARGET;
      var totalSpan = el("span", { class: "history-total", style: "color:" + (hit ? color : "var(--text-dim)") + ";" }, [
        document.createTextNode(String(total)), el("span", { class: "history-target-txt" }, "/" + TARGET)
      ]);
      if (hit) totalSpan.appendChild(icon("check", 13, "margin-left:4px;color:" + color + ";"));
      var row = el("div", { class: "history-row" }, [
        el("div", { class: "history-row-top" }, [el("span", { class: "history-date" }, fmtShort(d) + (d === today ? " · Today" : "")), totalSpan])
      ]);
      if (mode === "sets") {
        if (sets.length > 0) {
          var chips = el("div", { class: "history-sets" });
          sets.forEach(function (s) {
            var c = s.knee ? ACCENT.knee : color;
            var chip = el("span", { class: "history-chip", style: "border-color:" + c + ";color:" + c + ";" }, String(s.reps));
            if (s.knee) chip.appendChild(icon("flag", 10, "margin-left:3px;"));
            chips.appendChild(chip);
          });
          row.appendChild(chips);
        } else row.appendChild(el("div", { class: "history-empty" }, "—"));
      } else row.appendChild(segBar(sets, color, 8));
      list.appendChild(row);
    });
    view.appendChild(list);
    container.appendChild(view);
  }

  function renderProgress(container) {
    var exId = currentExId(), color = ACCENT[exId], today = todayISO();
    var range = state.range_progress, days = lastNDays(range, today);
    var totals = days.map(function (d) { return dayTotal(state.log, d, exId); });
    var max = Math.max(TARGET, Math.max.apply(null, totals.concat([1])));
    var hitCount = totals.filter(function (t) { return t >= TARGET; }).length;
    var avg = totals.length ? Math.round((totals.reduce(function (a, b) { return a + b; }, 0) / totals.length) * 10) / 10 : 0;
    var streak = 0, d = today;
    while (dayTotal(state.log, d, exId) >= TARGET) { streak++; d = addDays(d, -1); }

    var view = el("div", { class: "view" });
    var rangeCtl = el("div", { class: "seg-control" });
    [7, 30, 60].forEach(function (r) { rangeCtl.appendChild(el("button", { class: "seg-opt" + (range === r ? " seg-opt-active" : ""), onClick: function () { state.range_progress = r; render(); } }, r + "d")); });
    view.appendChild(rangeCtl);

    view.appendChild(el("div", { class: "stat-row" }, [
      el("div", { class: "stat-card" }, [el("div", { class: "stat-num", style: "color:" + color + ";" }, String(streak)), el("div", { class: "stat-label" }, "day streak")]),
      el("div", { class: "stat-card" }, [el("div", { class: "stat-num", style: "color:" + color + ";" }, hitCount + "/" + days.length), el("div", { class: "stat-label" }, "days hit 50")]),
      el("div", { class: "stat-card" }, [el("div", { class: "stat-num", style: "color:" + color + ";" }, String(avg)), el("div", { class: "stat-label" }, "avg / day")])
    ]));

    var w = 320, h = 160, padL = 28, padB = 18;
    var chartW = w - padL - 8, chartH = h - padB - 10;
    var barW = Math.max(4, chartW / days.length - (range > 30 ? 1 : 4));
    var targetY = 10 + chartH - (TARGET / max) * chartH;
    var svg = svgEl("svg", { width: "100%", viewBox: "0 0 " + w + " " + h, preserveAspectRatio: "none", class: "chart-svg" });
    svg.appendChild(svgEl("line", { x1: padL, x2: w - 4, y1: targetY, y2: targetY, stroke: "var(--text-dim)", "stroke-dasharray": "3,3", "stroke-width": "1" }));
    var lbl = svgEl("text", { x: 4, y: targetY + 3, class: "chart-axis-label", fill: "var(--text-dim)" }); lbl.textContent = "50"; svg.appendChild(lbl);
    totals.forEach(function (t, i) {
      var bh = (t / max) * chartH, x = padL + i * (chartW / days.length) + (chartW / days.length - barW) / 2, y = 10 + chartH - bh;
      svg.appendChild(svgEl("rect", { x: x, y: y, width: barW, height: Math.max(bh, t > 0 ? 2 : 0), rx: barW > 6 ? 2 : 1, fill: t >= TARGET ? color : "var(--bar-under)" }));
    });
    view.appendChild(el("div", { class: "chart-card" }, [svg, el("div", { class: "chart-x-labels" }, [el("span", {}, fmtShort(days[0])), el("span", {}, fmtShort(days[days.length - 1]))])]));
    container.appendChild(view);
  }

  function renderHeader(container) {
    var header = el("div", { class: "app-header" });
    header.appendChild(el("div", { class: "brand" }, [el("span", { class: "brand-num" }, "50"), el("span", { class: "brand-text" }, "THE 50 CHALLENGE")]));
    var tabs = el("div", { class: "ex-tabs" });
    state.exercisesEnabled.forEach(function (id, i) {
      var meta = EXERCISES.filter(function (e) { return e.id === id; })[0];
      tabs.appendChild(el("button", { class: "ex-tab" + (i === state.exIndex ? " ex-tab-active" : ""), style: i === state.exIndex ? "border-color:" + ACCENT[id] + ";color:" + ACCENT[id] + ";" : "", onClick: function () { state.exIndex = i; render(); } }, meta.label));
    });
    if (state.exercisesEnabled.length < EXERCISES.length) {
      tabs.appendChild(el("button", { class: "ex-tab ex-tab-add", onClick: function () { state.showAddExercise = true; render(); } }, icon("plus", 14)));
    }
    header.appendChild(tabs);
    container.appendChild(header);
  }

  function renderTabBar(container) {
    var bar = el("nav", { class: "tab-bar" });
    [{ id: "today", label: "Today", ic: "check" }, { id: "history", label: "History", ic: "listTree" }, { id: "progress", label: "Progress", ic: "trendingUp" }].forEach(function (t) {
      bar.appendChild(el("button", { class: "tab-btn" + (state.tab === t.id ? " tab-btn-active" : ""), onClick: function () { state.tab = t.id; render(); } }, [icon(t.ic, 20), el("span", {}, t.label)]));
    });
    container.appendChild(bar);
  }

  function renderAddExerciseModal(container) {
    if (!state.showAddExercise) return;
    var backdrop = el("div", { class: "modal-backdrop", onClick: function () { state.showAddExercise = false; render(); } });
    var card = el("div", { class: "modal-card" });
    card.addEventListener("click", function (e) { e.stopPropagation(); });
    card.appendChild(el("div", { class: "modal-head" }, [el("span", {}, "Add exercise"), el("button", { class: "icon-btn", onClick: function () { state.showAddExercise = false; render(); } }, icon("x", 18))]));
    EXERCISES.filter(function (e) { return state.exercisesEnabled.indexOf(e.id) === -1; }).forEach(function (e) {
      card.appendChild(el("button", { class: "modal-option", style: "border-color:" + ACCENT[e.id] + ";", onClick: function () {
        state.exercisesEnabled.push(e.id); state.exIndex = state.exercisesEnabled.length - 1; state.showAddExercise = false; render();
      } }, [el("span", { style: "color:" + ACCENT[e.id] + ";" }, e.label), icon("plus", 16)]));
    });
    backdrop.appendChild(card);
    container.appendChild(backdrop);
  }

  function render() {
    var root = document.getElementById("root");
    root.innerHTML = "";
    var shell = el("div", { class: "app-shell" });
    renderHeader(shell);
    var main = el("main", { class: "app-main" });
    if (state.tab === "today") renderToday(main);
    else if (state.tab === "history") renderHistory(main);
    else if (state.tab === "progress") renderProgress(main);
    shell.appendChild(main);
    renderTabBar(shell);
    renderAddExerciseModal(shell);
    root.appendChild(shell);
  }

  state.log = loadLog();
  state.dateIso = todayISO();
  render();
})();
</script>
</body>
</html>
